services:
  api:
    build: .
    container_name: blacksilver_api_dev
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-9095}:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /var/www/html
          ignore:
            - vendor/
            - storage/
            - bootstrap/cache/

  reverb:
    build: .
    container_name: blacksilver_reverb_dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "while [ ! -f /var/www/html/vendor/autoload.php ]; do echo 'Waiting for composer...'; sleep 2; done && php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction"
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /var/www/html
          ignore:
            - vendor/
            - storage/
            - bootstrap/cache/

  queue:
    build: .
    container_name: blacksilver_queue_dev
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "while [ ! -f /var/www/html/vendor/autoload.php ]; do echo 'Waiting for composer...'; sleep 2; done && php artisan queue:listen --sleep=3 --tries=3"
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /var/www/html
          ignore:
            - vendor/
            - storage/
            - bootstrap/cache/