# =============================================================================
# Servicios:
#   nginx    → Reverse proxy: API (FastCGI) + WebSockets (proxy_pass a Reverb)
#   php-fpm  → Sirve la API Laravel vía FastCGI en el puerto 9000
#   reverb   → Laravel Reverb WebSocket server en el puerto 8080
#   queue    → Worker de cola (QUEUE_CONNECTION=database)
#
# La base de datos MySQL es EXTERNA al compose (ya corre en el VPS).
# Coolify inyecta el .env con las variables de entorno en el deploy.
# =============================================================================

services:
  # ──────────────────────────────────────────────────────────────────────────
  # NGINX — Punto de entrada único. Expone el puerto 80.
  # Coolify/Traefik gestiona SSL en el host; este contenedor solo hace HTTP.
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    volumes:
      # Volumen de storage (read-only) para servir archivos subidos directamente
      - laravel-storage:/var/www/storage:ro

    depends_on:
      php-fpm:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # PHP-FPM — Procesa las peticiones HTTP de la API Laravel.
  # El entrypoint corre migraciones y cachea configs en el primer arranque.
  # ──────────────────────────────────────────────────────────────────────────
  php-fpm:
    image: blacksilver-api-php:${DOCKER_TAG}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: unless-stopped
    # El entrypoint solo lo usa php-fpm para correr migraciones/cache al inicio
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["php-fpm"]
    volumes:
      # Storage persistente: archivos subidos, caché de framework, sesiones
      - laravel-storage:/var/www/storage

    healthcheck:
      # Verifica que FPM está escuchando en el puerto 9000
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s # Tiempo para migraciones en el primer arranque

  # ──────────────────────────────────────────────────────────────────────────
  # REVERB — Laravel Reverb WebSocket Server.
  # Misma imagen que php-fpm pero con CMD distinto. Sin entrypoint de setup.
  # Nginx lo proxea en las rutas /app/, /apps/, /channels/.
  # ──────────────────────────────────────────────────────────────────────────
  reverb:
    image: blacksilver-api-php:${DOCKER_TAG}
    pull_policy: never
    restart: unless-stopped
    command:
      [
        "php",
        "artisan",
        "reverb:start",
        "--host=0.0.0.0",
        "--port=8080",
        "--no-interaction",
      ]
    volumes:
      # Permisos de lectura/escritura para que Reverb pueda escribir logs
      - laravel-storage:/var/www/storage

    depends_on:
      php-fpm:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # QUEUE — Worker de cola de trabajos en background.
  # QUEUE_CONNECTION=database (usa la misma MySQL externa).
  # ──────────────────────────────────────────────────────────────────────────
  queue:
    image: blacksilver-api-php:${DOCKER_TAG}
    pull_policy: never
    restart: unless-stopped
    command:
      ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=3"]
    volumes:
      - laravel-storage:/var/www/storage

    depends_on:
      php-fpm:
        condition: service_healthy


volumes:
  # Volumen persistente para storage de Laravel.
  # Compartido entre php-fpm (escritura), reverb (lectura), queue (escritura)
  # y nginx (lectura para servir archivos públicos).
  laravel-storage:
