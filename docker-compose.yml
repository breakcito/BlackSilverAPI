services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_ENV=production
    image: blacksilver-api:latest
    container_name: ${CONTAINER_NAME:-blacksilver-api}
    restart: unless-stopped

    # Volúmenes persistentes
    volumes:
      - api_storage:/var/www/html/storage
      - api_logs:/var/log

    # Recursos asignados para exprimir tu VPS
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 4G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - coolify

volumes:
  api_storage:
    name: ${VOLUME_STORAGE:-blacksilver_api_storage}
  api_logs:
    name: ${VOLUME_LOGS:-blacksilver_api_logs}

networks:
  coolify:
    name: ${NETWORK:-coolify}
    external: true