services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    stop_grace_period: 2s
    volumes:
      - laravel-storage:/var/www/storage:ro
    networks:
      - default
      - coolify
    depends_on:
      php-fpm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/api/health/live || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.${COOLIFY_RESOURCE_UUID:-nginx}.loadbalancer.healthcheck.path=/api/health/live"
      - "traefik.http.services.${COOLIFY_RESOURCE_UUID:-nginx}.loadbalancer.healthcheck.interval=5s"
      - "traefik.http.services.${COOLIFY_RESOURCE_UUID:-nginx}.loadbalancer.healthcheck.timeout=2s"

  php-fpm:
    image: blacksilver-api-php:${DOCKER_TAG}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: unless-stopped
    stop_grace_period: 2s
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["php-fpm"]
    networks:
      default:
        aliases:
          - php-fpm-local
    volumes:
      - laravel-storage:/var/www/storage
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 3
      start_period: 5s

  reverb:
    image: blacksilver-api-php:${DOCKER_TAG}
    pull_policy: never
    restart: unless-stopped
    init: true
    stop_signal: SIGINT
    stop_grace_period: 2s
    networks:
      default:
        aliases:
          - reverb-local
    command:
      [
        "php",
        "artisan",
        "reverb:start",
        "--host=0.0.0.0",
        "--port=8080",
        "--no-interaction",
      ]
    volumes:
      - laravel-storage:/var/www/storage
    depends_on:
      php-fpm:
        condition: service_started

  queue:
    image: blacksilver-api-php:${DOCKER_TAG}
    pull_policy: never
    restart: unless-stopped
    init: true
    stop_signal: SIGINT
    stop_grace_period: 2s
    networks:
      - default
    command:
      ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=3", "--max-jobs=1000", "--max-time=3600"]
    volumes:
      - laravel-storage:/var/www/storage
    depends_on:
      php-fpm:
        condition: service_started

volumes:
  laravel-storage:

networks:
  default: {}
  coolify:
    external: true