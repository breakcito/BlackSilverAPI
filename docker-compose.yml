services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_ENV=production
    image: blacksilver-api:latest
    container_name: ${CONTAINER_NAME:-blacksilver-api}
    restart: unless-stopped

    environment:
      # === App Laravel ===
      - APP_NAME=${APP_NAME:-BlackSilverAPI}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY:?APP_KEY es REQUERIDO}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:?APP_URL es REQUERIDO}
      - SERVER_PORT=80

      # === Localización ===
      - APP_LOCALE=es
      - APP_FALLBACK_LOCALE=en
      - APP_FAKER_LOCALE=es_PE
      - APP_TIMEZONE=America/Lima

      # === Logs ===
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # === Base de Datos ===
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_HOST:?DB_HOST es REQUERIDO}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE es REQUERIDO}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME es REQUERIDO}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD es REQUERIDO}

      # === Drivers ===
      - CACHE_STORE=${CACHE_STORE:-database}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}

      # === Autenticación JWT ===
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET es REQUERIDO}
      - JWT_TTL=${JWT_TTL:-10080}

      # === Reverb (WebSockets) ===
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=${REVERB_HOST}
      - REVERB_PORT=${REVERB_PORT:-443}
      - REVERB_SCHEME=${REVERB_SCHEME:-https}
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080

    volumes:
      - api_storage:/var/www/html/storage
      - api_logs:/var/log

    # Configuración de esteroides para tus 48GB de RAM y 12 Cores
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 4G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - coolify

volumes:
  api_storage:
    name: ${VOLUME_STORAGE:-blacksilver_api_storage}
  api_logs:
    name: ${VOLUME_LOGS:-blacksilver_api_logs}

networks:
  coolify:
    name: ${NETWORK:-coolify}
    external: true