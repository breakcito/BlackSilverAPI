worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;

    server {
        listen 80;

        # La raíz apunta al public/ del contenedor php-fpm.
        # Nginx no necesita acceso físico a los archivos .php porque solo
        # pasa el SCRIPT_FILENAME como parámetro a FPM (FastCGI).
        root /var/www/public;
        index index.php;

        # ─────────────────────────────────────────────────────────────────────
        # WebSockets — Laravel Reverb
        # Pusher-compatible: el cliente se conecta a /app/{key}
        # Nginx hace upgrade del protocolo HTTP → WS y proxea a Reverb.
        # ─────────────────────────────────────────────────────────────────────
        location ~* ^/(app|apps|channels)/ {
            proxy_pass         http://reverb:8080;
            proxy_http_version 1.1;

            # Headers obligatorios para el upgrade WebSocket
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeout largo: las conexiones WS son persistentes
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ─────────────────────────────────────────────────────────────────────
        # Archivos de storage (imágenes, adjuntos subidos por el ERP)
        # El volumen laravel-storage se monta en /var/www/storage en Nginx.
        # ─────────────────────────────────────────────────────────────────────
        location /storage/ {
            alias /var/www/storage/app/public/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ─────────────────────────────────────────────────────────────────────
        # API Laravel — todas las rutas van a través de index.php
        # ─────────────────────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass php-fpm:9000;

            # SCRIPT_FILENAME apunta al path dentro del contenedor php-fpm,
            # NO en el contenedor Nginx. Nginx solo pasa la cadena a FPM.
            fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME     $fastcgi_script_name;

            include fastcgi_params;

            fastcgi_read_timeout    300s;
            fastcgi_buffer_size     16k;
            fastcgi_buffers         4 16k;
            fastcgi_connect_timeout 60s;
        }

        # Bloquear acceso a archivos ocultos (.env, .git, etc.)
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
