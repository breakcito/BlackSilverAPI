worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;

    # Resolver: DNS interno de Docker para resolución lazy de upstreams
    # definidos como variables ($php_fpm_upstream, $reverb_upstream).
    # Necesario cuando los servicios pueden arrancar después que Nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # El bloque server (con los upstreams php-fpm-local / reverb-local) se
    # carga desde /etc/nginx/conf.d/default.conf. Ver docker-compose.yml
    # para ver los network aliases que hacen único cada upstream por env.
    include /etc/nginx/conf.d/*.conf;
}
