worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;

    # El bloque server se carga desde /etc/nginx/conf.d/default.conf,
    # que es generado por envsubst a partir de default.conf.template
    # (con ${PHP_FPM_HOST} y ${REVERB_HOST} resueltos a los container_names
    # únicos del env actual: php-fpm-prod/dev y reverb-prod/dev).
    include /etc/nginx/conf.d/*.conf;
}
